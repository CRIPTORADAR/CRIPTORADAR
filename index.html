<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CriptoRadar — Análisis de Trading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020818; color: #e6edf3; font-family: Arial, sans-serif; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px 0; border-bottom: 1px solid #1a3a6a; }
        .header h1 { font-size: 32px; color: #00ccff; letter-spacing: 8px; }
        .header p { color: #0066ff; font-size: 11px; letter-spacing: 4px; margin-top: 8px; }
        .upload-section { margin: 30px 0; }
        .upload-area { border: 2px dashed #0066ff; border-radius: 8px; padding: 30px; text-align: center; margin-bottom: 15px; cursor: pointer; }
        .upload-area label { cursor: pointer; color: #00ccff; }
        .previews { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .preview-item { position: relative; }
        .preview-item img { width: 120px; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid #0066ff; }
        .preview-item .remove { position: absolute; top: -5px; right: -5px; background: #f85149; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 10px; }
        .direction-section { display: flex; gap: 10px; margin-bottom: 15px; }
        .direction-btn { flex: 1; padding: 12px; border: 2px solid #0066ff; background: transparent; color: #e6edf3; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .direction-btn.active-long { background: #0f3320; border-color: #3fb950; color: #3fb950; }
        .direction-btn.active-short { background: #3d0f0f; border-color: #f85149; color: #f85149; }
        .analyze-btn { width: 100%; padding: 15px; background: #0066ff; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; letter-spacing: 4px; }
        .analyze-btn:disabled { background: #1a3a6a; cursor: not-allowed; }
        .result { margin-top: 20px; background: #0d1117; border: 1px solid #1a3a6a; border-radius: 8px; padding: 20px; white-space: pre-wrap; line-height: 1.8; font-size: 14px; display: none; }
        .loading { text-align: center; color: #00ccff; padding: 20px; display: none; }
        .footer { text-align: center; padding: 20px 0; color: #0066ff; font-size: 10px; letter-spacing: 3px; border-top: 1px solid #1a3a6a; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CRIPTO·RADAR</h1>
            <p>ANÁLISIS INSTITUCIONAL · CRIPTO</p>
        </div>
        <div class="upload-section">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <label>Pulse aquí para subir gráficos (puede subir varias imágenes)</label>
                <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)" style="display:none">
            </div>
            <div class="previews" id="previews"></div>
            <div class="direction-section">
                <button class="direction-btn" id="longBtn" onclick="setDirection('long')">BUSCO LARGO</button>
                <button class="direction-btn" id="shortBtn" onclick="setDirection('short')">BUSCO CORTO</button>
            </div>
            <button class="analyze-btn" onclick="analyze()" id="analyzeBtn">ANALIZAR</button>
        </div>
        <div class="loading" id="loading">Analizando gráficos con metodología CriptoRadar...</div>
        <div class="result" id="result"></div>
        <div class="footer">CRIPTO-RADAR · ANÁLISIS TÉCNICO INSTITUCIONAL</div>
    </div>
    <script>
        let images = [];
        let direction = null;
        function handleFiles(files) {
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    images.push({ data: e.target.result, name: file.name });
                    renderPreviews();
                };
                reader.readAsDataURL(file);
            });
        }
        function renderPreviews() {
            const container = document.getElementById('previews');
            container.innerHTML = '';
            images.forEach((img, i) => {
                container.innerHTML += '<div class="preview-item"><img src="' + img.data + '" alt="' + img.name + '"><button class="remove" onclick="removeImage(' + i + ')">x</button></div>';
            });
        }
        function removeImage(index) {
            images.splice(index, 1);
            renderPreviews();
        }
        function setDirection(dir) {
            direction = dir;
            document.getElementById('longBtn').className = 'direction-btn' + (dir === 'long' ? ' active-long' : '');
            document.getElementById('shortBtn').className = 'direction-btn' + (dir === 'short' ? ' active-short' : '');
        }
        async function analyze() {
            if (images.length === 0) { alert('Suba al menos un gráfico'); return; }
            if (!direction) { alert('Seleccione si busca largo o corto'); return; }
            document.getElementById('analyzeBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ images, direction })
                });
                const data = await response.json();
                document.getElementById('result').style.display = 'block';
                document.getElementById('result').textContent = data.analysis;
            } catch (err) {
                document.getElementById('result').style.display = 'block';
                document.getElementById('result').textContent = 'Error al analizar. Inténtelo de nuevo.';
            }
            document.getElementById('loading').style.display = 'none';
            document.getElementById('analyzeBtn').disabled = false;
        }
    </script>
</body>
</html>
